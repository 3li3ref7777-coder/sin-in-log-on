<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Reset Access</title>
    <link rel="stylesheet" href="./fmypass.css">
</head>
<body>
    <div class="container">
        <div class="glass-card">
            <div class="icon-box">
                <i class="lock-icon">🔒</i>
            </div>
            <h2>Forgot Password?</h2>
            <p>No worries! Enter your registered email below and we will send you a link to reset your password.</p>
            
            <form>
                <div class="input-group">
                    <input type="email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="neon-btn">Send Reset Link</button>
            </form>

            <div class="footer-links">
                <a href="./index.html">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
